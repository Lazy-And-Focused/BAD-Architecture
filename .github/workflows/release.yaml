name: Create BAD Release

on:
  push:
    tags:
      - "rv*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Create tar archive
        run: |
          tar -czf release.tar.gz \
            --transform 's,^,release_contents/,' \
            src/ \
            test/ \
            .github/workflows/swagger.yaml \
            .env.example \
            .env.swagger \
            .gitignore \
            .prettierrc.mjs \
            bad.json \
            eslint.config.mjs \
            LICENSE \
            nest-cli.json \
            package.json \
            prisma.config.ts \
            swagger-template.html \
            README.md \
            docker-compose.yaml \
            npm--dockerfile \
            pnpm--dockerfile \
            .dockerignore \
            tsconfig.json \
            tsconfig.base.json \
            tsconfig.main.json \
            tsconfig.build.json

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo="$GITHUB_REPOSITORY" \
            --title="${GITHUB_REF_NAME#rv}" \
            --generate-notes \
            release.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
